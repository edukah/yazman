<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazman – Wysiwyg Editor</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css">
    <link rel="stylesheet" href="_hot/build.dev.css">
    <script type="text/javascript" src="_hot/build.dev.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 2rem;
            color: #2d3436;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;

        h2 {

            border: 1px solid #dfe6e9;
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

<body>
    <div class="container">
        <h1>Yazman – Wysiwyg Editor</h1>
        <div>
            <div id="editor-example" class="wysiwyg"></div>

    <script type="text/javascript">
